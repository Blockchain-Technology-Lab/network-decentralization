# The layers for which an analysis should be performed.
layers:
  - Consensus
  - Execution

mode:
  - Countries
  - Organizations
  - Clients

execution_parameters:
  concurrency: 100

# Metrics for network analysis (organizations)
network_metrics:
  hhi:
  nakamoto_coefficient:
  total_entities:
  concentration_ratio:
    - 1
    - 3

# Metrics for geographic analysis (countries)
geo_metrics:
  hhi:
  nakamoto_coefficient:
  entropy:
    - 1
  total_entities:
  concentration_ratio:
    - 1
    - 3