# Modes to process in parse.py and plot.py.
mode:
  - Countries
  - Organizations
#  - ASN

# Metrics for network analysis (organizations)
network_metrics:
  hhi:
  nakamoto_coefficient:
  concentration_ratio:
    - 1
    - 3

# Metrics for geographic analysis (countries)
geo_metrics:
  hhi:
  nakamoto_coefficient:
  entropy:
    - 1
  concentration_ratio:
    - 1
    - 3

# Output directory for generated JSON/CSV/PNG artifacts.
# Can be absolute or relative to the cardano folder.
output_directory: ./output
